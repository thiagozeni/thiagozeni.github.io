<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- ZN. Ghost · outline · stroke lime, ponto lime sólido com glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <text x="0" y="100"
        font-family="Unbounded, 'Arial Black', sans-serif"
        font-weight="900" font-size="120"
        letter-spacing="-9.6"
        fill="none" stroke="#C6FF00" stroke-width="3">ZN</text>
  <text x="218" y="100"
        font-family="Unbounded, 'Arial Black', sans-serif"
        font-weight="900" font-size="120"
        letter-spacing="-9.6"
        fill="#C6FF00" filter="url(#glow)">.</text>
</svg>
